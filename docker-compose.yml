version: '3.8'

services:
  skill-bot:
    build: .
    container_name: ai-skill-discovery-bot
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      # Add your tokens here (use secrets in production!)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Add a separate scheduler service if needed
  # scheduler:
  #   build: .
  #   command: ["python", "-m", "src.main", "--scheduler-only"]
  #   depends_on:
  #     - skill-bot
  #   environment:
  #     - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}

volumes:
  data:
  logs:
